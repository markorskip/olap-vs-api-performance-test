apiVersion: v1
kind: Namespace
metadata:
  name: olap-benchmark
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: olap-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: customer-service
          image: customer-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: APP_POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/benchmark
            - name: APP_POSTGRES_USERNAME
              value: benchmark
            - name: APP_POSTGRES_PASSWORD
              value: benchmark
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: olap-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: product-service
          image: product-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: APP_POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/benchmark
            - name: APP_POSTGRES_USERNAME
              value: benchmark
            - name: APP_POSTGRES_PASSWORD
              value: benchmark
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-service
  namespace: olap-benchmark
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grid-service
  template:
    metadata:
      labels:
        app: grid-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: grid-service
          image: grid-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: APP_POSTGRES_URL
              value: jdbc:postgresql://postgres:5432/benchmark
            - name: APP_POSTGRES_USERNAME
              value: benchmark
            - name: APP_POSTGRES_PASSWORD
              value: benchmark
            - name: APP_CLICKHOUSE_URL
              value: jdbc:ch://clickhouse:8123/benchmark
            - name: CUSTOMER_SERVICE_URL
              value: http://customer-service:8081
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:8082
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: olap-benchmark
spec:
  selector:
    app: customer-service
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: olap-benchmark
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: grid-service
  namespace: olap-benchmark
spec:
  selector:
    app: grid-service
  ports:
    - port: 8080
      targetPort: 8080
